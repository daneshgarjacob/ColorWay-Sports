<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1500px;
    height: 500px;
    background: #0021A5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }
  .logo-group { display: flex; align-items: center; gap: 20px; }
  .wordmark-group { display: flex; flex-direction: column; }
  .wordmark { font-size: 72px; font-weight: 800; letter-spacing: -1.5px; line-height: 1; }
  .white { color: #ffffff; }
  .orange { color: #FF5910; }
  .tagline { font-size: 14px; font-weight: 500; letter-spacing: 3px; color: rgba(255,255,255,0.5); margin-top: 6px; }
</style>
</head>
<body>
  <div class="logo-group">
    <svg width="80" height="80" viewBox="0 0 512 512">
      <g transform="translate(256,380)">
        <rect x="-30" y="-300" width="60" height="220" rx="30" fill="#ffffff" transform="rotate(-24)"/>
        <rect x="-30" y="-300" width="60" height="220" rx="30" fill="#4A90D9" transform="rotate(-8)"/>
        <rect x="-30" y="-300" width="60" height="220" rx="30" fill="#FF5910" transform="rotate(8)"/>
        <rect x="-30" y="-300" width="60" height="220" rx="30" fill="#6B9E8F" transform="rotate(24)"/>
        <circle cx="0" cy="0" r="22" fill="#FF5910"/>
      </g>
    </svg>
    <div class="wordmark-group">
      <div class="wordmark"><span class="white">Color</span><span class="orange">Way</span> <span class="white">Sports</span><span class="orange">.</span></div>
      <div class="tagline">EVERY UNIFORM. &nbsp; EVERY LOGO. &nbsp; EVERY DETAIL.</div>
    </div>
  </div>
</body>
</html>
