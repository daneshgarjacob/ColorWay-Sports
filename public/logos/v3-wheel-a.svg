<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120" width="540" height="120">
  <!-- Color Wheel A: Full gradient color wheel ring with clean CW monogram centered inside -->

  <defs>
    <!-- Conic gradient simulated with multiple arc segments -->
    <!-- We'll use 12 color stops around the wheel -->
  </defs>

  <!-- Color wheel built from 12 arc segments for smooth gradient -->
  <!-- Center at 52, 52 — outer radius 44, inner radius 28 (ring) -->

  <!-- Red → Orange (0°-30°) -->
  <path d="M52 8 A44 44 0 0 1 74.1 13.1 L65.4 26.7 A28 28 0 0 0 52 22 Z" fill="#FF0000"/>
  <!-- Orange → Yellow-Orange (30°-60°) -->
  <path d="M74.1 13.1 A44 44 0 0 1 90.9 29.9 L79.4 38.6 A28 28 0 0 0 65.4 26.7 Z" fill="#FF5500"/>
  <!-- Yellow-Orange → Yellow (60°-90°) -->
  <path d="M90.9 29.9 A44 44 0 0 1 96 52 L80 52 A28 28 0 0 0 79.4 38.6 Z" fill="#FFAA00"/>
  <!-- Yellow → Yellow-Green (90°-120°) -->
  <path d="M96 52 A44 44 0 0 1 90.9 74.1 L79.4 65.4 A28 28 0 0 0 80 52 Z" fill="#CCDD00"/>
  <!-- Yellow-Green → Green (120°-150°) -->
  <path d="M90.9 74.1 A44 44 0 0 1 74.1 90.9 L65.4 79.4 A28 28 0 0 0 79.4 65.4 Z" fill="#44BB00"/>
  <!-- Green → Teal (150°-180°) -->
  <path d="M74.1 90.9 A44 44 0 0 1 52 96 L52 80 A28 28 0 0 0 65.4 79.4 Z" fill="#00AA55"/>
  <!-- Teal → Cyan (180°-210°) -->
  <path d="M52 96 A44 44 0 0 1 29.9 90.9 L38.6 79.4 A28 28 0 0 0 52 80 Z" fill="#0099AA"/>
  <!-- Cyan → Blue (210°-240°) -->
  <path d="M29.9 90.9 A44 44 0 0 1 13.1 74.1 L26.7 65.4 A28 28 0 0 0 38.6 79.4 Z" fill="#0055CC"/>
  <!-- Blue → Indigo (240°-270°) -->
  <path d="M13.1 74.1 A44 44 0 0 1 8 52 L22 52 A28 28 0 0 0 26.7 65.4 Z" fill="#003087"/>
  <!-- Indigo → Purple (270°-300°) -->
  <path d="M8 52 A44 44 0 0 1 13.1 29.9 L26.7 38.6 A28 28 0 0 0 22 52 Z" fill="#5500AA"/>
  <!-- Purple → Magenta (300°-330°) -->
  <path d="M13.1 29.9 A44 44 0 0 1 29.9 13.1 L38.6 26.7 A28 28 0 0 0 26.7 38.6 Z" fill="#AA0088"/>
  <!-- Magenta → Red (330°-360°) -->
  <path d="M29.9 13.1 A44 44 0 0 1 52 8 L52 22 A28 28 0 0 0 38.6 26.7 Z" fill="#DD0044"/>

  <!-- White center circle to clean up the middle -->
  <circle cx="52" cy="52" r="24" fill="white"/>

  <!-- CW monogram — interlinked, clean -->
  <text x="40" y="58" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#003087" letter-spacing="-1.5">C</text>
  <text x="52" y="58" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#FF5910" letter-spacing="-1.5">W</text>

  <!-- Text -->
  <text x="116" y="50" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="42" fill="#003087" letter-spacing="-1.5">
    <tspan font-weight="300">Color</tspan><tspan font-weight="700" fill="#FF5910">Way</tspan>
  </text>

  <!-- Thin separator -->
  <line x1="118" y1="60" x2="410" y2="60" stroke="#003087" stroke-width="0.6" opacity="0.12"/>

  <!-- SPORTS -->
  <text x="119" y="82" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="500" fill="#003087" letter-spacing="9">SPORTS</text>
</svg>