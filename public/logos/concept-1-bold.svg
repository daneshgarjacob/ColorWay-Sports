<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <!-- Concept 1: Bold & Athletic — Angled shield with clean CW, heavy sans-serif -->

  <!-- Shield shape — proper proportions, slight 3D feel -->
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#003a9e"/>
      <stop offset="100%" stop-color="#002060"/>
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path d="M8 8 L82 8 L82 72 L45 100 L8 72 Z" fill="url(#shieldGrad)"/>
  <!-- Orange accent stripe across shield -->
  <path d="M8 36 L82 36 L82 48 L8 48 Z" fill="#FF5910" opacity="0.9"/>

  <!-- C in shield top half -->
  <text x="31" y="32" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">C</text>

  <!-- W in shield bottom half -->
  <text x="45" y="76" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">W</text>

  <!-- COLORWAY text — heavy weight -->
  <text x="104" y="58" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="50" font-weight="900" fill="#003087" letter-spacing="-2.5">
    <tspan>COLOR</tspan><tspan fill="#FF5910">WAY</tspan>
  </text>

  <!-- SPORTS — wide tracked, sits below -->
  <text x="106" y="90" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#003087" letter-spacing="14.5">SPORTS</text>

  <!-- Thick orange underline bar -->
  <rect x="104" y="98" width="368" height="4" rx="2" fill="#FF5910"/>
</svg>