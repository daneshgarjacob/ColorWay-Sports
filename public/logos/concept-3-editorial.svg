<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <!-- Concept 3: Editorial & Premium — Vertical color bars (paint swatches) + elegant serif type -->

  <!-- Five graduated color bars — like a designer's swatch palette -->
  <rect x="10" y="20" width="10" height="70" rx="2" fill="#001845"/>
  <rect x="24" y="26" width="10" height="58" rx="2" fill="#003087"/>
  <rect x="38" y="32" width="10" height="46" rx="2" fill="#1A5DAD"/>
  <rect x="52" y="26" width="10" height="58" rx="2" fill="#FF5910"/>
  <rect x="66" y="20" width="10" height="70" rx="2" fill="#FF7A45"/>

  <!-- Text: Elegant serif "Color" + italic serif "Way" -->
  <text x="100" y="60" font-family="Georgia, 'Times New Roman', Times, serif" font-size="46" fill="#003087" letter-spacing="-1">
    <tspan font-weight="400">Color</tspan><tspan font-weight="700" font-style="italic" fill="#FF5910">Way</tspan>
  </text>

  <!-- SPORTS in refined small-cap style -->
  <text x="102" y="88" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#003087" letter-spacing="9.5">SPORTS</text>

  <!-- Very subtle hairline -->
  <line x1="100" y1="96" x2="390" y2="96" stroke="#003087" stroke-width="0.4" opacity="0.2"/>
</svg>